version: '3.8'

services:
  # 1. Development Environment (Only Flask & Requests)
  development:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: app-development
    ports:
      - "8081:5000"
    environment:
      - ENV=development
    volumes:
      - ..:/app
    # Installs only runtime web tools before launching the server
    command: >
      sh -c "pip install --no-cache-dir flask requests && 
             python server.py"

  # 2. Testing Environment (Only Testing Tools: pytest & black)
  testing:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: app-testing
    ports:
      - "8082:5000"
    environment:
      - ENV=testing
    # Installs testing framework tools and keeps the container waiting for your test scripts
    command: >
      sh -c "pip install --no-cache-dir flask pytest pytest-cov black && 
             python server.py"

  # 3. Validation Environment (Only Production / Validation Tools: gunicorn)
  validation:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: app-validation
    ports:
      - "8083:5000"
    environment:
      - ENV=validation
    # Installs strict production grade servers to simulate a live deployment
    command: >
      sh -c "pip install --no-cache-dir flask gunicorn && 
             python server.py"
